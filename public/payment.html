

<div class="container" style="max-width:500px;margin:60px auto;">
	<h2 style="text-align:center;margin-bottom:32px;">Choose Payment Method</h2>
	<form method="POST" action="" class="card" style="padding:32px;">
		<div style="display:flex;flex-direction:column;gap:24px;">
			<label class="payment-option" style="display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;">
				<input type="radio" name="payment_method" value="credit_card" required style="accent-color:var(--blue);width:20px;height:20px;">
				<i class="fa fa-credit-card fa-lg" style="color:var(--blue);"></i>
				<span>Credit/Debit Card</span>
			</label>
			<label class="payment-option" style="display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;">
				<input type="radio" name="payment_method" value="upi" style="accent-color:var(--blue);width:20px;height:20px;">
				<i class="fa fa-university fa-lg" style="color:var(--blue);"></i>
				<span>UPI</span>
			</label>
			<label class="payment-option" style="display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;">
				<input type="radio" name="payment_method" value="net_banking" style="accent-color:var(--blue);width:20px;height:20px;">
				<i class="fa fa-globe fa-lg" style="color:var(--blue);"></i>
				<span>Net Banking</span>
			</label>
			<label class="payment-option" style="display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--border);border-radius:8px;cursor:pointer;">
				<input type="radio" name="payment_method" value="cod" style="accent-color:var(--blue);width:20px;height:20px;">
				<i class="fa fa-money-bill-wave fa-lg" style="color:var(--blue);"></i>
				<span>Cash on Delivery</span>
			</label>
		</div>
		<button type="submit" class="btn btn-primary" style="width:100%;margin-top:32px;">Proceed to Pay</button>
	</form>
</div>
