

<section style="min-height:calc(100vh - 70px);display:flex;align-items:center;justify-content:center;padding:40px 24px;">
<div style="width:100%;max-width:480px;">
    <div style="text-align:center;margin-bottom:32px;">
        <div style="font-family:'Orbitron';font-size:32px;font-weight:900;letter-spacing:6px;margin-bottom:8px;">VAL<span style="color:var(--blue)">T</span>RION</div>
        <h2 style="font-size:22px;color:var(--silver-light);">Create your account</h2>
    </div>
    <div class="card">
        <form method="post">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="10-digit mobile" maxlength="10" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:15px;margin-top:8px;">
                <i class="fa fa-user-plus"></i> Create Account
            </button>
        </form>
        <p style="text-align:center;margin-top:20px;color:var(--silver);font-size:14px;">
            Already have an account? <a href="" style="color:var(--blue);">Sign in</a>
        </p>
    </div>
</div>
</section>
