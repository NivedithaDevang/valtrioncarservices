

<section class="section" style="min-height:80vh;display:flex;align-items:center;">
<div class="container" style="max-width:600px;text-align:center;">
    <div style="width:100px;height:100px;background:rgba(0,255,136,0.1);border:3px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;animation:popIn 0.5s ease;">
        <i class="fa fa-check" style="font-size:48px;color:var(--green);"></i>
    </div>
    <h1 style="font-family:'Orbitron';font-size:28px;color:var(--green);margin-bottom:12px;letter-spacing:2px;">PAYMENT SUCCESSFUL</h1>
    <p style="color:var(--silver);font-size:16px;margin-bottom:32px;">Your booking has been confirmed! We'll be in touch shortly.</p>

    <div class="card" style="text-align:left;margin-bottom:24px;">
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--silver);">Booking ID</span><strong style="color:var(--blue);font-family:'Orbitron';">#V</strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--silver);">Service</span><strong></strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--silver);">Car</span><strong> </strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--silver);">Date</span><strong></strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">
            <span style="color:var(--silver);">Payment</span><strong style="color:var(--green);"></strong>
        </div>
        <div style="display:flex;justify-content:space-between;padding:10px 0;">
            <span style="color:var(--silver);">Amount</span><strong style="font-family:'Orbitron';color:var(--blue);font-size:20px;">Rs.</strong>
        </div>
    </div>

    <div style="display:flex;gap:12px;justify-content:center;">
        <a href="" class="btn btn-primary"><i class="fa fa-gauge"></i> Go to Dashboard</a>
        <a href="" class="btn btn-outline" target="_blank"><i class="fa fa-file-invoice"></i> Download Invoice</a>
    </div>
</div>
</section>
<style>
@keyframes popIn { 0%{transform:scale(0);opacity:0;} 70%{transform:scale(1.1);} 100%{transform:scale(1);opacity:1;} }
</style>
