{% extends 'base.html' %}
{% block content %}
<div style="padding:30px;max-width:900px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;">
        <div><p class="section-label">ADMIN</p><h2 class="section-title">Manage <span>Mechanics</span></h2></div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="openAddMechModal()"><i class="fa fa-plus"></i> Add Mechanic</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-silver btn-sm"><i class="fa fa-arrow-left"></i> Back</a>
        </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;">
    {% for m in mechanics %}
    <div class="card">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;">
            <div style="width:50px;height:50px;background:rgba(0,102,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron';font-size:18px;color:var(--blue);">{{ m.name[0].upper() }}</div>
            <div><div style="font-weight:700;font-size:16px;">{{ m.name }}</div><div style="color:var(--silver);font-size:12px;">{{ m.specialty or 'General Mechanic' }}</div></div>
        </div>
        <div style="color:var(--silver);font-size:13px;margin-bottom:12px;"><i class="fa fa-phone"></i> {{ m.phone or 'No phone' }}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="color:var(--green);font-size:12px;font-weight:600;"><i class="fa fa-circle" style="font-size:8px;"></i> Active</span>
            <button class="btn btn-danger btn-sm" onclick="deleteMech({{ m.id }})"><i class="fa fa-trash"></i></button>
        </div>
    </div>
    {% else %}
    <div style="grid-column:1/-1;text-align:center;color:var(--silver);padding:40px;">No mechanics added yet.</div>
    {% endfor %}
    </div>
</div>
<div id="mech-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;align-items:center;justify-content:center;">
    <div class="card" style="width:420px;max-width:90vw;">
        <h3 style="font-family:'Orbitron';font-size:14px;letter-spacing:2px;margin-bottom:20px;color:var(--blue);">ADD MECHANIC</h3>
        <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="m-name" class="form-control"></div>
        <div class="form-group"><label class="form-label">Phone</label><input type="text" id="m-phone" class="form-control"></div>
        <div class="form-group"><label class="form-label">Specialty</label><input type="text" id="m-spec" class="form-control" placeholder="e.g. Engine, AC, Electricals"></div>
        <div style="display:flex;gap:10px;margin-top:8px;">
            <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="addMech()"><i class="fa fa-check"></i> Add</button>
            <button class="btn btn-silver" style="flex:1;justify-content:center;" onclick="document.getElementById('mech-modal').style.display='none'">Cancel</button>
        </div>
    </div>
</div>
<script>
function openAddMechModal(){ document.getElementById('mech-modal').style.display='flex'; }
function addMech(){
    var name = document.getElementById('m-name').value.trim();
    if(!name){ alert('Mechanic name is required.'); return; }
    fetch('/admin/mechanic/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        name:name,phone:document.getElementById('m-phone').value.trim(),specialty:document.getElementById('m-spec').value.trim()
    })}).then(r=>r.json()).then(d=>{ if(d.success) location.reload(); else alert(d.error || 'Unable to add mechanic.'); })
    .catch(()=>alert('Unable to add mechanic.'));
}
function deleteMech(id){
    if(!confirm('Remove this mechanic?')) return;
    fetch('/admin/mechanic/delete/'+id,{method:'POST'}).then(r=>r.json()).then(d=>{ if(d.success) location.reload(); });
}
</script>
{% endblock %}
